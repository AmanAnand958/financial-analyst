# FinDoc Intelligence (FDI) — System Configuration

# Application
app:
  name: "FinDoc Intelligence"
  version: "1.0.0"
  description: "RAG-Based Financial Document Intelligence System"

# Document Processing
ingestion:
  chunk_size: 512          # tokens per chunk
  chunk_overlap: 100       # overlap between consecutive chunks
  max_file_size_mb: 50     # max PDF upload size
  max_documents: 100       # max documents in system
  supported_formats:
    - pdf

# Embedding
embedding:
  model: "all-MiniLM-L6-v2"
  dimension: 384
  batch_size: 32

# Vector Store
vector_store:
  type: "chromadb"
  path: "./chroma_db"
  collection_name: "financial_documents"

# Retrieval
retrieval:
  semantic_weight: 0.6     # weight for semantic search score
  bm25_weight: 0.4         # weight for BM25 score
  top_k_candidates: 20     # candidates from each search method
  top_k_final: 3           # final chunks returned to LLM
  confidence_threshold: 0.6  # min score to proceed with LLM generation
  reranker_model: "cross-encoder/ms-marco-MiniLM-L6-v2"

# LLM
llm:
  provider: "groq"
  model: "llama-3.3-70b-versatile"
  max_tokens: 1024
  temperature: 0.1         # low temp for factual financial queries

# API
api:
  host: "0.0.0.0"
  port: 8000
  timeout_seconds: 10

# Evaluation
evaluation:
  test_dataset_path: "./data/processed/eval_dataset.json"
  target_context_precision: 0.85
  target_faithfulness: 0.90
  target_answer_relevancy: 0.85
  target_latency_ms: 5000

# Logging
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"
