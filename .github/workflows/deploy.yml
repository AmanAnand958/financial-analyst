name: Deploy to Azure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: kpmgregistry.azurecr.io
  API_IMAGE: fdi-api
  UI_IMAGE: fdi-ui
  RESOURCE_GROUP: kpmg-rag-rg
  CONTAINER_APP_NAME: fdi-app
  CONTAINER_APP_UI_NAME: fdi-ui

jobs:
  # ── Test ────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          GROQ_API_KEY: test_key_for_ci
        run: pytest tests/ -v --tb=short

  # ── Build & Push ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure Container Registry
        run: az acr login --name kpmgregistry

      - name: Build & Push API Image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest \
            -f Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest

      - name: Build & Push UI Image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.UI_IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.UI_IMAGE }}:latest \
            -f Dockerfile.streamlit .
          docker push ${{ env.REGISTRY }}/${{ env.UI_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.UI_IMAGE }}:latest

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Deploy UI to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_UI_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.UI_IMAGE }}:${{ github.sha }}

      - name: Print Live URLs
        run: |
          API_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          UI_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_UI_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "✅ API: https://$API_URL"
          echo "✅ UI:  https://$UI_URL"
